<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeechSentry</title>
  <link rel="icon" href="{{ url_for('static', filename='22.jpg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red:    #c0392b;
      --red-glow: rgba(192, 57, 43, 0.45);
      --navy:   #0a0d1c;
      --panel:  rgba(10, 13, 28, 0.85);
      --border: rgba(192, 57, 43, 0.35);
      --text:   #e8e4e0;
      --muted:  #6b6e82;
      --mono:   'Space Mono', monospace;
      --sans:   'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--sans);
      background-color: var(--navy);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Atmospheric background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 80%, rgba(192,57,43,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 20%, rgba(30,40,100,0.35) 0%, transparent 55%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 39px,
          rgba(255,255,255,0.015) 39px,
          rgba(255,255,255,0.015) 40px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline flicker */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 0;
      animation: scanlines 8s linear infinite;
    }

    @keyframes scanlines {
      from { background-position: 0 0; }
      to   { background-position: 0 100vh; }
    }

    /* ── Card ── */
    .login {
      position: relative;
      z-index: 1;
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 68px 64px 56px;
      max-width: 720px;
      width: calc(100% - 32px);
      box-shadow:
        0 0 0 1px rgba(192,57,43,0.1),
        0 8px 40px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes cardIn {
      from { transform: translateY(24px) scale(0.98); opacity: 0; }
      to   { transform: translateY(0) scale(1);       opacity: 1; }
    }

    /* Corner accents */
    .login::before,
    .login::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--red);
      border-style: solid;
    }
    .login::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .login::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 36px;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.5s 0.35s ease forwards;
    }

    h1 {
      font-family: var(--mono);
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
      opacity: 0;
      animation: fadeUp 0.5s 0.45s ease forwards;
    }

    h1 span {
      color: var(--red);
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.5s 0.55s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Form ── */
    .input-group {
      position: relative;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.5s 0.65s ease forwards;
    }

    .input-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 17px 22px;
      font-family: var(--sans);
      font-size: 17px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      color: #fff;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      caret-color: var(--red);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
      font-size: 14px;
    }

    input[type="text"]:focus {
      border-color: rgba(192, 57, 43, 0.6);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.12), 0 0 20px rgba(192,57,43,0.08);
    }

    /* ── Button ── */
    .btn-wrap {
      opacity: 0;
      animation: fadeUp 0.5s 0.75s ease forwards;
    }

    button {
      width: 100%;
      padding: 17px 28px;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: transparent;
      color: #fff;
      border: 1px solid var(--red);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.25s, box-shadow 0.25s;
    }

    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--red);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    button span {
      position: relative;
      z-index: 1;
    }

    button:hover::before {
      transform: translateX(0);
    }

    button:hover {
      box-shadow: 0 0 28px var(--red-glow);
    }

    button:active {
      transform: scale(0.985);
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      opacity: 0;
      animation: fadeUp 0.5s 0.8s ease forwards;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .divider span {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Results ── */
    .results {
      opacity: 0;
      animation: fadeUp 0.5s 0.9s ease forwards;
    }

    .results:empty { display: none; }

    .result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 3px;
      background: rgba(255,255,255,0.025);
      border-left: 2px solid transparent;
      margin-bottom: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, background 0.2s;
    }

    .result-item:hover {
      background: rgba(255,255,255,0.04);
      border-left-color: var(--red);
    }

    /* If your Flask template uses the h3 approach, keep this too */
    .results h3 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 400;
      line-height: 2.4;
      color: rgba(232, 228, 224, 0.75);
      letter-spacing: 0.04em;
    }

    /* ── Status badge (optional enhancement) ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      font-family: var(--mono);
      border-radius: 2px;
      letter-spacing: 0.1em;
    }
    .badge-safe    { background: rgba(39,174,96,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    .badge-warning { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
  </style>
</head>
<body onload="myFunction()">
  <div class="login">
    <div class="header">
      <p class="eyebrow">// content analysis</p>
      <h1>Speech<span>Sentry</span></h1>
      <p class="subtitle">Toxicity detection & content classification</p>
      <p style="margin-top: 18px; color: #9ba1b7; font-size: 0.95rem;">
        View your bad-word usage dashboard on <a href="{{ url_for('dashboard') }}" style="color:#c0392b; text-decoration:underline;">/dashboard</a>
      </p>
    </div>

    <form action="{{ url_for('predict') }}" method="post">
      <div class="input-group">
        <label class="input-label" for="text">Input Text</label>
        <input id="text" type="text" name="text" placeholder="Enter a comment to analyse…" required autocomplete="off">
      </div>
      <div class="btn-wrap">
        <button type="submit"><span>Run Analysis →</span></button>
      </div>
    </form>

    <div class="divider"><span>results</span></div>

    <div class="results">
      <h3>
        {{ pred_tox }}<br>
        {{ pred_sev }}<br>
        {{ pred_obs }}<br>
        {{ pred_ins }}<br>
        {{ pred_thr }}<br>
        {{ pred_ide }}
      </h3>
    </div>
  </div>
</body>
</html>
